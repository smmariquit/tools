name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run Linter
      run: npm run lint || true
      
    - name: Run Unit Tests
      run: npm run test:ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium
      
    - name: Run Playwright E2E Tests
      run: npx playwright test
      
    - uses: actions/upload-artifact@v7
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  # Deploys are handled by Vercel Git integration (phtools.me). Actions deploy
  # was removed — it required VERCEL_* secrets that were never configured.
